services:
  - type: web
    name: nutcheck
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: nutcheck-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
