<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - NutCheck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      font-family: "IBM Plex Sans Thai", sans-serif;
      background: linear-gradient(180deg, #f7efe2, #dec6a3);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #4d2f1c;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(90, 56, 23, 0.14);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(77, 47, 28, 0.12);
    }
    .title {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #4d2f1c;
      font-family: "Baloo 2", cursive;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #4d2f1c;
      margin-bottom: 0.5rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid rgba(77, 47, 28, 0.12);
      border-radius: 12px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #9b6337;
      box-shadow: 0 0 0 3px rgba(155, 99, 55, 0.1);
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #9b6337, #784722);
      color: white;
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(155, 99, 55, 0.3);
    }
    .btn:active {
      transform: translateY(0);
    }
    .link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: #9b6337;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .link:hover {
      color: #784722;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">เข้าสู่ระบบ NutCheck</h1>
    <form id="loginForm">
      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="username" required placeholder="กรอกชื่อผู้ใช้">
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <input type="password" id="password" required placeholder="กรอกรหัสผ่าน">
      </div>
      <button type="submit" class="btn">เข้าสู่ระบบ</button>
    </form>
    <a href="/" class="link">กลับไปหน้าสแกนบัตร</a>
  </div>
  <script src="/toast.js"></script>
  <script src="/auth.js"></script>
</body>
</html>
