<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutCheck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="theme-warm">
  <main class="shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Attendance made playful</p>
        <h1>NutCheck</h1>
        <p class="subtitle">เช็คชื่อเข้าเรียนแบบง่าย ๆ พร้อมดูภาพรวมบน dashboard ได้ทันที</p>
        <div class="hero-actions">
          <a class="ghost-link" href="/dashboard.html">เปิด Dashboard</a>
          <a class="ghost-link" href="/login.html" style="margin-left: 10px;">เข้าสู่ระบบ</a>
        </div>
      </div>

      <div class="check-card">
        <p class="section-label">แตะบัตรเพื่อเช็คชื่อ</p>

        <label class="field">
          <span>รหัสนักเรียน / แตะบัตร NFC</span>
          <input id="studentId" type="text" placeholder="พิมพ์รหัส หรือ แตะบัตร NFC" autofocus autocomplete="off">
        </label>

        <button id="checkButton" class="primary-button" type="button">เช็คชื่อเข้าเรียน</button>
        <button id="webNfcButton" class="secondary-button" type="button" style="margin-top: 10px; width: 100%; display: none;">📱 สแกน NFC ด้วยมือถือ</button>
        <button id="openQrScannerBtn" class="secondary-button" type="button" style="margin-top: 10px; width: 100%;">📷 สแกน QR / กรอกรหัสเช็คชื่อ</button>

        <div class="loader" id="loader" hidden>🐿️💨 กำลังวิ่งไปลงชื่อ...</div>
        <p class="result" id="result">พร้อมเช็คชื่อ</p>
      </div>
    </section>
  </main>

  <div id="feedbackOverlay" class="feedback-overlay">
    <div id="feedbackIcon" class="feedback-icon"></div>
  </div>

  <div id="qrScannerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; padding:2rem; border-radius:18px; width:100%; max-width:400px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:center;">
      <h2 style="margin-top:0; margin-bottom:1rem; font-size:1.5rem; color:#4a2a16;">สแกน QR / กรอกรหัส</h2>
      
      <div id="qrReaderContainer" style="width: 100%; min-height: 250px; background: #f3f4f6; border-radius: 8px; margin-bottom: 1rem; overflow: hidden;"></div>
      
      <p style="margin-bottom:0.5rem; font-size:0.9rem; color:#6b7280;">หรือกรอกรหัส 6 หลัก (พร้อมรหัสนักเรียน)</p>
      
      <label class="field" style="text-align: left; margin-bottom: 0.5rem;">
        <span>รหัสนักเรียน</span>
        <input id="qrStudentIdInput" type="text" placeholder="รหัสนักเรียน">
      </label>
      
      <label class="field" style="text-align: left; margin-bottom: 1rem;">
        <span>รหัสเช็คชื่อ 6 หลัก</span>
        <input id="qrCodeInput" type="text" placeholder="------" maxlength="6" style="letter-spacing: 0.5em; text-align: center; font-size: 1.2rem; font-weight: bold;">
      </label>
      
      <div style="display:flex; gap:0.5rem;">
        <button type="button" id="submitQrCodeBtn" class="primary-button" style="flex:1;">ตกลง</button>
        <button type="button" id="closeQrScannerBtn" class="secondary-button" style="flex:1;">ยกเลิก</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="/toast.js"></script>
  <script src="/main.js"></script>
</body>
</html>
